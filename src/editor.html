<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Edit Note</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f5f5f5;
    }
    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'SF Mono', Monaco, monospace;
      resize: none;
    }
    textarea:focus {
      outline: none;
      border-color: #007AFF;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .copy { background: #007AFF; color: white; }
    .copy:hover { background: #0056b3; }
    .save { background: #34C759; color: white; }
    .save:hover { background: #28a745; }
    .clear { background: #FF3B30; color: white; }
    .clear:hover { background: #d63027; }
  </style>
</head>
<body>
  <div class="label" id="noteLabel">Note 1</div>
  <textarea id="noteText" placeholder="Type your note here... (AI prompt, API key, etc.)"></textarea>
  <div class="buttons">
    <button class="copy" onclick="copyNote()">Copy</button>
    <button class="clear" onclick="clearNote()">Clear</button>
    <button class="save" onclick="saveNote()">Save</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const index = parseInt(urlParams.get('index'));
    const currentNote = urlParams.get('note') || '';

    document.getElementById('noteLabel').textContent = `Note ${index + 1}`;
    document.getElementById('noteText').value = currentNote;

    function saveNote() {
      const text = document.getElementById('noteText').value;
      window.api.saveNote(index, text).then(() => {
        window.api.closeWindow();
      });
    }

    function copyNote() {
      const text = document.getElementById('noteText').value;
      if (text) window.api.copyNote(text);
    }

    function clearNote() {
      document.getElementById('noteText').value = '';
    }

    // Auto-save on Cmd/Ctrl+S
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        saveNote();
      }
    });
  </script>
</body>
</html>
