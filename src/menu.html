<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QwikNotes</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 0;
      margin: 0;
      background: #1e1e1e;
      color: #fff;
    }
    .header {
      background: #333;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }
    .notes { padding: 10px; }
    .note-card {
      background: #2d2d2d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .note-title { font-size: 13px; color: #888; }
    .note-actions { display: flex; gap: 6px; }
    .note-actions button {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    .copy { background: #007AFF; color: white; }
    .clear { background: #FF3B30; color: white; }
    textarea {
      width: 100%;
      height: 60px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      padding: 8px;
      font-size: 12px;
      resize: none;
    }
    textarea:focus { outline: none; border-color: #007AFF; }
    .footer {
      padding: 10px;
      text-align: center;
      border-top: 1px solid #333;
    }
    .footer button {
      padding: 8px 20px;
      background: #34C759;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">📝 QwikNotes</div>
  <div class="notes" id="notesContainer"></div>
  <div class="footer">
    <button onclick="saveAll()">Save All Notes</button>
  </div>

  <script>
    const NOTE_COUNT = window.noteCount || 5;
    const notes = window.notes || Array(NOTE_COUNT).fill('');
    
    function render() {
      const container = document.getElementById('notesContainer');
      container.innerHTML = notes.map((note, i) => `
        <div class="note-card">
          <div class="note-header">
            <span class="note-title">Note ${i + 1}</span>
            <div class="note-actions">
              <button class="copy" onclick="copy(${i})">Copy</button>
              <button class="clear" onclick="clear(${i})">Clear</button>
            </div>
          </div>
          <textarea id="note${i}" placeholder="Type here...">${note}</textarea>
        </div>
      `).join('');
    }
    
    function copy(i) {
      const text = document.getElementById('note' + i).value;
      if (text) navigator.clipboard.writeText(text);
    }
    
    function clear(i) {
      document.getElementById('note' + i).value = '';
    }
    
    function saveAll() {
      const newNotes = [];
      for (let i = 0; i < NOTE_COUNT; i++) {
        newNotes.push(document.getElementById('note' + i).value);
      }
      // Save via localStorage (simple persistence)
      localStorage.setItem('qwiknotes', JSON.stringify(newNotes));
      alert('Saved!');
    }
    
    // Load saved notes
    const saved = localStorage.getItem('qwiknotes');
    if (saved) {
      const parsed = JSON.parse(saved);
      for (let i = 0; i < Math.min(parsed.length, NOTE_COUNT); i++) {
        notes[i] = parsed[i];
      }
    }
    
    render();
  </script>
</body>
</html>
